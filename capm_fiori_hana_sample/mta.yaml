# ============================================================
# Multi-Target Application descriptor — Cloud Foundry deployment
# ============================================================
# `mbt build` reads this file to produce one .mtar archive
# containing every module below; `cf deploy mta_archives/*.mtar`
# (or the "deploy" npm script) then rolls it out as one atomic
# unit across HANA Cloud, the CAP service, and the Fiori app's
# HTML5 hosting.
#
# Standard CAP + Fiori + HANA Cloud MTA shape — this is the same
# structure `cds add mta` / `cds add hana` generate, written out
# by hand here so every module/resource is explained inline.
# ============================================================

_schema-version: "3.3"
ID: capm-fiori-hana-sample
version: 1.0.0

modules:
  # ── The CAP service itself ──────────────────────────────
  - name: capm-fiori-hana-sample-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: capm-fiori-hana-sample-db
      - name: capm-fiori-hana-sample-auth
      - name: capm-fiori-hana-sample-destination
      - name: capm-fiori-hana-sample-connectivity

  # ── One-time HANA Cloud schema deployment ───────────────
  # Deploys db/ (compiled to .hdbtable/.hdbview artifacts) into
  # the HDI container BEFORE the srv module starts — deploy order
  # is controlled by the `requires` edges above/below, not by
  # module list order.
  - name: capm-fiori-hana-sample-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: capm-fiori-hana-sample-db

  # ── The Fiori app, packaged for the HTML5 Application Repo ─
  - name: capm-fiori-hana-sample-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: capm-fiori-hana-sample-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: orders
          artifacts:
            - orders.zip
          target-path: resources/

  - name: orders
    type: html5
    path: app/orders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  # ── Fiori Launchpad site config (destination + repo entries) ─
  - name: capm-fiori-hana-sample-destination-content
    type: com.sap.application.content
    requires:
      - name: capm-fiori-hana-sample-destination
        parameters:
          content-target: true
      - name: capm-fiori-hana-sample-html5-repo-host
        parameters:
          service-key:
            name: html5-repo-host-key
      - name: capm-fiori-hana-sample-auth
        parameters:
          service-key:
            name: uaa-key
    parameters:
      content:
        instance:
          destinations:
            - Name: capm_fiori_hana_sample_html5_repo_host
              ServiceInstanceName: capm-fiori-hana-sample-html5-repo-host
              ServiceKeyName: html5-repo-host-key
              sap.cloud.service: capm.fiori.hana.sample
            - Name: capm_fiori_hana_sample_uaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: capm-fiori-hana-sample-auth
              ServiceKeyName: uaa-key
              sap.cloud.service: capm.fiori.hana.sample
          existing_destinations_policy: update

resources:
  # ── HANA Cloud (HDI container — one schema per deployment) ─
  - name: capm-fiori-hana-sample-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ── XSUAA — auth/authz, role collections from xs-security.json ─
  - name: capm-fiori-hana-sample-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: capm-fiori-hana-sample-${org}-${space}
        tenant-mode: dedicated

  # ── Destination service — for THIS app's own destinations
  # (used by capm_external_api_integration/ in the sibling
  # folder; included here too since a production CAP app almost
  # always ends up needing at least one outbound destination).
  - name: capm-fiori-hana-sample-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: capm-fiori-hana-sample-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  # ── HTML5 Application Repository — hosts the built Fiori app ─
  - name: capm-fiori-hana-sample-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production
